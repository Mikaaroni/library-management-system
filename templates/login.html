{% extends "base.html" %}
{% block title %}Login - Library Management System{% endblock %}

{% block body %}
<div class="login-page">
    <div class="login-bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📚</div>
                <h1>Library Management</h1>
                <p>Sign in to manage your library system</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="form-input-icon">
                        <span class="icon">👤</span>
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="form-input-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top: 8px;">
                    Sign In →
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted);">
                <p>Default login: <strong style="color: var(--text-secondary);">admin</strong> / <strong style="color: var(--text-secondary);">admin123</strong></p>
            </div>

            <div class="login-links">
                <p>Are you a member? <a href="{{ url_for('member_login') }}">Member Login →</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
