{% extends "base.html" %}
{% block title %}Sign Up - Library Management System{% endblock %}

{% block body %}
<div class="login-page">
    <div class="login-bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card signup-card">
            <div class="login-header">
                <div class="login-logo">📝</div>
                <h1>Create Account</h1>
                <p>Join the library to start borrowing books</p>
            </div>

            <form method="POST" action="{{ url_for('member_signup') }}">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name <span class="required">*</span></label>
                        <div class="form-input-icon">
                            <span class="icon">👤</span>
                            <input type="text" id="first_name" name="first_name" class="form-input"
                                   placeholder="First name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name <span class="required">*</span></label>
                        <div class="form-input-icon">
                            <span class="icon">👤</span>
                            <input type="text" id="last_name" name="last_name" class="form-input"
                                   placeholder="Last name" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <div class="form-input-icon">
                        <span class="icon">🆔</span>
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="Choose a username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <div class="form-input-icon">
                        <span class="icon">📧</span>
                        <input type="email" id="email" name="email" class="form-input"
                               placeholder="Your email address" required autocomplete="email">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <div class="form-input-icon">
                            <span class="icon">📱</span>
                            <input type="tel" id="phone" name="phone" class="form-input"
                                   placeholder="Phone number">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <div class="form-input-icon">
                            <span class="icon">🏠</span>
                            <input type="text" id="address" name="address" class="form-input"
                                   placeholder="Your address">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <div class="form-input-icon">
                            <span class="icon">🔒</span>
                            <input type="password" id="password" name="password" class="form-input"
                                   placeholder="Min. 6 characters" required minlength="6"
                                   autocomplete="new-password">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password <span class="required">*</span></label>
                        <div class="form-input-icon">
                            <span class="icon">🔒</span>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                                   placeholder="Confirm password" required minlength="6"
                                   autocomplete="new-password">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top: 8px;">
                    Create Account →
                </button>
            </form>

            <div class="login-links">
                <p>Already have an account? <a href="{{ url_for('member_login') }}">Sign in here →</a></p>
                <p class="login-alt-link">Are you an admin? <a href="{{ url_for('login') }}">Admin Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
